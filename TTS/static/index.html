<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>목소리 복원 TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: #1e2d1e;
      border: 1px solid #4ade80;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.75rem;
      color: #4ade80;
      margin-top: 8px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6ee7f7;
      margin-bottom: 16px;
    }

    /* 파일 업로드 드롭존 */
    .dropzone {
      border: 2px dashed #374151;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: #6ee7f7;
      background: #1a2535;
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .dropzone p {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .dropzone p strong {
      color: #e2e8f0;
    }

    /* 업로드된 파일 표시 */
    .file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      background: #111827;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 12px;
    }

    .file-preview.show { display: flex; }

    .file-preview .file-icon {
      font-size: 1.5rem;
    }

    .file-preview .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-preview .file-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-preview .file-status {
      font-size: 0.78rem;
      color: #4ade80;
      margin-top: 2px;
    }

    .file-preview audio {
      width: 100%;
      margin-top: 8px;
      accent-color: #6ee7f7;
    }

    /* 자동 전사 영역 */
    .transcribe-section {
      display: none;
      margin-top: 16px;
    }

    .transcribe-section.show { display: block; }

    .transcribe-label {
      font-size: 0.8rem;
      color: #6ee7f7;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .transcribe-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid #2d3348;
      border-top-color: #6ee7f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .transcribe-spinner.show { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .transcribe-hint {
      font-size: 0.75rem;
      color: #4b5563;
      margin-bottom: 8px;
    }

    textarea.prompt-text {
      width: 100%;
      background: #111827;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 72px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea.prompt-text:focus {
      outline: none;
      border-color: #6ee7f7;
    }

    textarea.prompt-text::placeholder { color: #4b5563; }

    /* 텍스트 입력 */
    textarea.main-text {
      width: 100%;
      background: #111827;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea.main-text:focus {
      outline: none;
      border-color: #6ee7f7;
    }

    textarea.main-text::placeholder { color: #4b5563; }

    .char-count {
      text-align: right;
      font-size: 0.78rem;
      color: #4b5563;
      margin-top: 6px;
    }

    /* 언어 선택 */
    .lang-select {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #2d3348;
      background: transparent;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn:hover { border-color: #6ee7f7; color: #6ee7f7; }

    .lang-btn.active {
      background: #6ee7f7;
      border-color: #6ee7f7;
      color: #0f1117;
      font-weight: 600;
    }

    /* 생성 버튼 */
    .generate-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 결과 섹션 */
    .result-card {
      display: none;
    }

    .result-card.show { display: block; }

    .result-audio {
      width: 100%;
      margin-top: 4px;
      accent-color: #6ee7f7;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 20px;
      background: #1a3a2a;
      border: 1px solid #4ade80;
      border-radius: 8px;
      color: #4ade80;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .download-btn:hover { background: #1f4a35; }

    /* 로딩 상태 */
    .loading-bar {
      display: none;
      height: 3px;
      background: linear-gradient(90deg, #22d3ee, #818cf8, #22d3ee);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 2px;
      margin-top: 12px;
    }

    .loading-bar.show { display: block; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .status-msg {
      text-align: center;
      font-size: 0.88rem;
      color: #94a3b8;
      margin-top: 10px;
      min-height: 20px;
    }

    .status-msg.error { color: #f87171; }
    .status-msg.success { color: #4ade80; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>목소리 복원 TTS</h1>
      <p>참조 음성을 업로드하고, 텍스트를 입력하면 그 목소리로 변환해드립니다.</p>
      <span class="badge">GPT-SoVITS</span>
    </div>

    <!-- Step 1: 음성 업로드 -->
    <div class="card">
      <h2>Step 1 — 참조 음성 업로드</h2>
      <div class="dropzone" id="dropzone">
        <input type="file" id="audioFile" accept=".mp3,.wav,.m4a,.flac,.ogg" />
        <div class="icon">🎙️</div>
        <p><strong>클릭하거나 파일을 드래그해서 올려주세요</strong></p>
        <p style="margin-top: 6px;">MP3, WAV, M4A, FLAC, OGG · 6초 이상 권장</p>
      </div>

      <div class="file-preview" id="filePreview">
        <div class="file-icon">🎵</div>
        <div class="file-info">
          <div class="file-name" id="fileName">파일명</div>
          <div class="file-status">업로드 완료</div>
          <audio id="refAudio" controls></audio>
        </div>
      </div>

      <!-- Whisper 자동 전사 결과 -->
      <div class="transcribe-section" id="transcribeSection">
        <div class="transcribe-label">
          <span>참조 음성 인식 결과 (Whisper)</span>
          <span class="transcribe-spinner" id="transcribeSpinner"></span>
        </div>
        <p class="transcribe-hint">자동으로 인식된 텍스트입니다. 틀린 부분이 있으면 직접 수정하세요.</p>
        <textarea
          class="prompt-text"
          id="promptText"
          placeholder="참조 음성 인식 중..."
          rows="3"
        ></textarea>
      </div>
    </div>

    <!-- Step 2: 텍스트 입력 -->
    <div class="card">
      <h2>Step 2 — 변환할 텍스트 입력</h2>
      <textarea
        class="main-text"
        id="inputText"
        placeholder="이 목소리로 읽을 문장을 입력하세요...&#10;예) 안녕하세요. 오늘도 좋은 하루 보내세요."
        maxlength="500"
      ></textarea>
      <div class="char-count"><span id="charCount">0</span> / 500</div>

      <h2 style="margin-top: 20px; margin-bottom: 10px;">언어 선택</h2>
      <div class="lang-select" id="langSelect">
        <button class="lang-btn active" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>

    <!-- 생성 버튼 -->
    <button class="generate-btn" id="generateBtn" disabled>
      목소리로 변환하기
    </button>
    <div class="loading-bar" id="loadingBar"></div>
    <p class="status-msg" id="statusMsg"></p>

    <!-- Step 3: 결과 -->
    <div class="card result-card" id="resultCard" style="margin-top: 20px;">
      <h2>Step 3 — 변환 결과</h2>
      <audio id="resultAudio" class="result-audio" controls></audio>
      <br />
      <a id="downloadBtn" class="download-btn" download="voice_clone.wav">
        ⬇️ WAV 다운로드
      </a>
    </div>
  </div>

  <script>
    const audioFileInput = document.getElementById('audioFile');
    const dropzone = document.getElementById('dropzone');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const refAudio = document.getElementById('refAudio');
    const transcribeSection = document.getElementById('transcribeSection');
    const transcribeSpinner = document.getElementById('transcribeSpinner');
    const promptText = document.getElementById('promptText');
    const inputText = document.getElementById('inputText');
    const charCount = document.getElementById('charCount');
    const generateBtn = document.getElementById('generateBtn');
    const loadingBar = document.getElementById('loadingBar');
    const statusMsg = document.getElementById('statusMsg');
    const resultCard = document.getElementById('resultCard');
    const resultAudio = document.getElementById('resultAudio');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;
    let trimmedRefPath = null;  // /transcribe가 반환한 트리밍된 서버 경로
    let selectedLang = 'ko';
    let isTranscribing = false;

    // 드래그 앤 드롭
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelect(file);
    });

    audioFileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFileSelect(e.target.files[0]);
    });

    function handleFileSelect(file) {
      selectedFile = file;
      trimmedRefPath = null;
      fileName.textContent = file.name;
      filePreview.classList.add('show');

      const url = URL.createObjectURL(file);
      refAudio.src = url;

      // 자동 전사 시작
      transcribeSection.classList.add('show');
      promptText.value = '';
      promptText.placeholder = '전사 중... (앞 10초만 사용됩니다)';
      transcribeSpinner.classList.add('show');
      isTranscribing = true;
      updateGenerateBtn();

      runTranscribe(file);
    }

    async function runTranscribe(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('language', selectedLang);

      try {
        const res = await fetch('/transcribe', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || '전사 실패');

        promptText.value = data.transcript;
        promptText.placeholder = '';
        trimmedRefPath = data.reference_path;  // 트리밍된 서버 경로 저장
        setStatus('참조 음성 인식 완료 (앞 10초)', 'success');
      } catch (err) {
        promptText.placeholder = '자동 인식 실패 — 직접 입력해주세요';
        setStatus('전사 오류: ' + err.message, 'error');
      } finally {
        transcribeSpinner.classList.remove('show');
        isTranscribing = false;
        updateGenerateBtn();
      }
    }

    // 텍스트 글자 수
    inputText.addEventListener('input', () => {
      charCount.textContent = inputText.value.length;
      updateGenerateBtn();
    });

    function updateGenerateBtn() {
      generateBtn.disabled = !(selectedFile && inputText.value.trim() && !isTranscribing);
    }

    // 언어 선택
    document.getElementById('langSelect').addEventListener('click', (e) => {
      if (!e.target.classList.contains('lang-btn')) return;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      selectedLang = e.target.dataset.lang;
    });

    // 변환 실행
    generateBtn.addEventListener('click', async () => {
      if (!selectedFile || !inputText.value.trim()) return;

      generateBtn.disabled = true;
      loadingBar.classList.add('show');
      resultCard.classList.remove('show');
      setStatus('GPT-SoVITS 변환 중... 처음 실행 시 모델 로드로 수분이 소요될 수 있습니다.', '');

      const formData = new FormData();
      formData.append('text', inputText.value.trim());
      formData.append('language', selectedLang);
      if (trimmedRefPath) {
        // 이미 트리밍된 서버 경로 사용 (파일 재업로드 불필요)
        formData.append('reference_path', trimmedRefPath);
      } else {
        formData.append('reference_audio', selectedFile);
      }
      if (promptText.value.trim()) {
        formData.append('prompt_text', promptText.value.trim());
      }

      try {
        const res = await fetch('/clone', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || '서버 오류');

        resultAudio.src = data.audio_url;
        downloadBtn.href = data.audio_url;
        resultCard.classList.add('show');
        setStatus('변환 완료!', 'success');
        resultAudio.play();
      } catch (err) {
        setStatus('오류: ' + err.message, 'error');
      } finally {
        loadingBar.classList.remove('show');
        generateBtn.disabled = false;
        updateGenerateBtn();
      }
    });

    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg' + (type ? ' ' + type : '');
    }
  </script>
</body>
</html>
